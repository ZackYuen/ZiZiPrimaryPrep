name: Build check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_GOOGLE_STT_URL: ${{ secrets.VITE_GOOGLE_STT_URL }}
          VITE_GOOGLE_SPEECH_API_KEY: ${{ secrets.VITE_GOOGLE_SPEECH_API_KEY }}
        run: npm run build

      # GitHub Pages is "Deploy from a branch → main / (root)".
      # The committed docs/ folder is what gets served at /ZiZiPrimaryPrep/docs/.
      # Do NOT use actions/deploy-pages here — it publishes docs as site root and blanks the app.
      - name: Ensure docs/.nojekyll exists after build
        run: |
          test -f docs/index.html
          test -d docs/assets
          touch docs/.nojekyll
