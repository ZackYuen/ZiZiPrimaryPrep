<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="袁碩孜（Seth）升小面試準備 — 藍田靈糧幼稚園 · 小學面試練習 App" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <title>碩孜升小面試 · Seth Prep</title>
    <script>
      // Pages serves branch root; built app is under /docs/
      if (location.hostname.endsWith('github.io')) {
        var ua = navigator.userAgent || ''
        var m = ua.match(/OS (\d+)[_ ]/)
        var ios = m ? parseInt(m[1], 10) : 99
        // Old iPad/iPhone: classic boot page (no type=module)
        if (/iP(hone|ad|od)/.test(ua) && ios > 0 && ios <= 11) {
          location.replace('/ZiZiPrimaryPrep/docs/ipad.html')
        } else {
          var target = '/ZiZiPrimaryPrep/docs/'
          if (!location.pathname.startsWith(target)) {
            location.replace(target)
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
