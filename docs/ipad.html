<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="袁碩孜升小面試 — 舊 iPad（iOS 10）專用頁" />
    <title>碩孜升小面試 · 舊 iPad</title>
    <link rel="stylesheet" href="/ZiZiPrimaryPrep/docs/assets/index-DJSasa-w.css" />
    <style>
      #zizi-boot {
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
        padding: 1.25rem;
        color: #1b3a4b;
        line-height: 1.5;
      }
      /* Old WebKit can freeze SPA views at opacity:0 after navigation */
      .session, .session__card, .parent, .vocab-card, .module-card {
        opacity: 1 !important;
        animation: none !important;
      }
    </style>
  </head>
  <body>
    <div id="zizi-boot">載入中…（舊 iPad 模式）</div>
    <div id="root"></div>
    <!-- Classic scripts only — no type=module (Safari 10 dies on modern modules). -->
    <script src="/ZiZiPrimaryPrep/docs/assets/polyfills-legacy-qGu1tXyz.js"></script>
    <script>
      (function () {
        function fail(msg) {
          var el = document.getElementById('zizi-boot');
          if (el) el.textContent = msg;
        }
        try {
          if (typeof System === 'undefined' || !System.import) {
            fail('SystemJS 未載入。請用較新 iPhone／iPad 開啟。');
            return;
          }
          System.import('/ZiZiPrimaryPrep/docs/assets/index-legacy-DmkyScBQ.js').then(function () {
            var el = document.getElementById('zizi-boot');
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }).catch(function (err) {
            fail('載入失敗：' + (err && err.message ? err.message : String(err)));
          });
        } catch (err) {
          fail('啟動失敗：' + (err && err.message ? err.message : String(err)));
        }
      })();
    </script>
  </body>
</html>
